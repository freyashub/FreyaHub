<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freya's Nexus Hub</title>
    <style>
        /* Base Reset & Core Fluid Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        :root {
            --bg-base: #020617;
            --blue-neon: #00f0ff;
            --blue-deep: #1d4ed8;
            --blue-dark: #0f172a;
            --text-pure: #ffffff;
            --text-dim: #94a3b8;
            --glass-panel: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --transition-fluid: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-pure);
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient Fluid Glow Background Layers */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }
        .orb-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--blue-neon); }
        .orb-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; background: var(--blue-deep); }

        /* Premium Capsule Top Navigation Bar */
        .top-navbar {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 8px 12px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .nav-tab {
            color: var(--text-pure);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 100px;
            transition: var(--transition-fluid);
        }

        .nav-tab:hover { color: var(--blue-neon); }
        .nav-tab.active {
            background: linear-gradient(135deg, var(--blue-neon), var(--blue-deep));
            color: #ffffff;
            font-weight: 600;
        }

        .audio-widget {
            display: flex;
            align-items: center;
            padding-left: 12px;
            border-left: 1px solid var(--glass-border);
            margin-left: 4px;
        }

        .audio-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-pure);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: var(--transition-fluid);
        }

        /* Layout Structural Grid Segments */
        section {
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 140px 2rem 60px 2rem;
            position: relative;
            z-index: 1;
        }

        .content-container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .gradient-blue {
            background: linear-gradient(135deg, var(--blue-neon) 0%, var(--blue-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            line-height: 1.7;
        }

        .launcher-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--glass-panel);
            border: 1px solid rgba(0, 240, 255, 0.25);
            padding: 18px 36px;
            border-radius: 100px;
            color: var(--text-pure);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            transition: var(--transition-fluid);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .launcher-btn:hover {
            transform: translateY(-3px);
            border-color: var(--blue-neon);
            box-shadow: 0 15px 30px rgba(0, 240, 255, 0.2);
        }

        /* --- DETAILED DESCRIPTION TEXT SECTION --- */
        .info-block {
            text-align: left;
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            margin-top: 4rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .info-block h2 {
            font-size: 2rem;
            margin-bottom: 1.25rem;
            letter-spacing: -0.5px;
        }

        .info-block p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* --- CONSOLIDATED APPLICATIONS GRID --- */
        .apps-title {
            margin-top: 5rem;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 2rem;
        }

        .apps-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            text-align: left;
        }

        .app-card {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: var(--transition-fluid);
        }

        .app-card:hover {
            border-color: rgba(0, 240, 255, 0.2);
            background: rgba(255,255,255,0.04);
            transform: translateY(-5px);
        }

        .app-card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; font-weight: 700; }
        .app-card p { font-size: 0.9rem; margin-bottom: 1.5rem; color: var(--text-dim); line-height: 1.5; }
        
        .badge-upcoming {
            display: inline-block;
            background: rgba(243, 176, 67, 0.1);
            color: #f3b043;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 50px;
            text-transform: uppercase;
            width: max-content;
        }

        /* --- WHO IS FREYA BIOGRAPHY PANEL --- */
        #about {
            background: rgba(1, 3, 10, 0.7);
            border-top: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }

        .about-card-layout {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3.5rem;
            text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .about-card-layout h2 { font-size: 2.5rem; margin-bottom: 1.5rem; letter-spacing: -1px; }
        .about-card-layout h3 { margin-bottom: 1rem; font-size: 1.4rem; font-weight: 700; }

        /* ==========================================================================
           ⚡ DISPLAY RESPONSIVE BREAKPOINT CONTROLLERS (Mobile, Desktop, Larger)
           ========================================================================== */
        @media (min-width: 1400px) {
            .content-container { max-width: 1100px; }
            h1 { font-size: 5rem; }
        }

        @media (max-width: 1200px) and (min-width: 769px) {
            h1 { font-size: 3.5rem; }
        }

        @media (max-width: 768px) {
            .top-navbar { width: 92%; justify-content: space-between; padding: 6px 12px; }
            .nav-tab { padding: 8px 14px; font-size: 0.85rem; }
            h1 { font-size: 2.6rem; }
            section { padding: 120px 1rem 40px 1rem; }
            .info-block, .about-card-layout { padding: 2rem; }
            .apps-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <!-- Circle Nav Header Capsule -->
    <nav class="top-navbar">
        <a href="#home" class="nav-tab active">Home</a>
        <a href="directory.html" class="nav-tab">Directory</a>
        <a href="#about" class="nav-tab">About</a>
        <div class="audio-widget">
            <button class="audio-btn" id="musicToggle" title="Toggle Background Music">▶</button>
        </div>
    </nav>

    <!-- SECTION 1: HOMEPAGE PLATFORM INTRO -->
    <section id="home">
        <div class="content-container">
            <h1>Welcome to <span class="gradient-blue">Freya's</span> Nexus</h1>
            <p>A personal front-end development web space designed to store upcoming automation engines, custom development tool scripts, and isolated information databases.</p>
            
            <a href="directory.html" class="launcher-btn">Enter Main Subject Directory ➔</a>

            <!-- Comprehensive System Overview Block -->
            <div class="info-block">
