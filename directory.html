<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Hub Directory</title>
    <style>
        /* Base Setup & Fluid Layout Mechanics */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        :root {
            --bg-base: #020617;
            --blue-neon: #00f0ff;
            --blue-deep: #1d4ed8;
            --text-pure: #ffffff;
            --text-dim: #64748b;
            --glass-panel: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
            --transition-fluid: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-pure);
            padding: 120px 0 0 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar Capsule Nav Bar */
        .top-navbar {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 8px 12px;
            border-radius: 100px;
            display: flex;
            gap: 8px;
            z-index: 1000;
        }

        .nav-tab {
            color: var(--text-pure);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 100px;
            transition: var(--transition-fluid);
        }

        .nav-tab:hover { color: var(--blue-neon); }
        .nav-tab.active { background: linear-gradient(135deg, var(--blue-neon), var(--blue-deep)); color: #fff; }

        /* Split-Screen Sidebar Structural Framework */
        .workspace-split {
            display: flex;
            width: 100%;
            height: calc(100vh - 120px);
        }

        /* Left Side-Scroll Rail (100 Tabs) */
        .sidebar-tabs {
            width: 300px;
            background: rgba(15, 23, 42, 0.2);
            border-right: 1px solid var(--glass-border);
            overflow-y: scroll;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-tabs::-webkit-scrollbar { width: 4px; }
        .sidebar-tabs::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        .side-tab {
            width: 100%;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            padding: 12px 18px;
            text-align: left;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-fluid);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .side-tab:hover { background: rgba(255, 255, 255, 0.02); color: var(--text-pure); }
        .side-tab.active {
            background: rgba(0, 240, 255, 0.05);
            border-color: rgba(0, 240, 255, 0.2);
            color: var(--blue-neon);
        }

        /* Right Content Panel Display Space */
        .display-workspace {
            flex: 1;
            overflow-y: auto;
            padding: 3.5rem;
            background: rgba(2, 6, 23, 0.4);
            display: flex;
            flex-direction: column;
        }

        .subject-header-area {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .subject-header-area h2 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; }

        .explain-box {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }

        .gradient-blue {
            background: linear-gradient(135deg, var(--blue-neon) 0%, var(--blue-deep) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Custom Isolated Chat Stream Setup per Subject */
        .embedded-chat-module {
            background: #050a18;
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 1.5rem;
            margin-top: auto;
        }

        .chat-header-line {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--blue-neon);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
        }

        .chat-feed-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .chat-msg { color: #cbd5e1; }
        .chat-msg span { color: var(--blue-neon); font-weight: 600; }

        .chat-input-wrapper { display: flex; gap: 10px; }

        .chat-field {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 10px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
        }
        .chat-field:focus { border-color: var(--blue-neon); }

        .chat-send-btn {
            background: var(--blue-neon);
            color: var(--bg-base);
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }

        /* ==========================================
           ⚡ DISPLAY RESPONSIVE ENGINE BREAKPOINTS 
           ========================================== */
        @media (min-width: 1400px) {
            .workspace-split { height: calc(100vh - 120px); }
            .sidebar-tabs { width: 340px; }
            .display-workspace { padding: 5rem; }
        }

        @media (max-width: 768px) {
            body { padding: 90px 0 0 0; overflow-y: auto; }
            .top-navbar { width: 92%; justify-content: space-between; padding: 6px 12px; }
            .nav-tab { padding: 8px 14px; font-size: 0.85rem; }
            .workspace-split { flex-direction: column; height: auto; }
            
            /* Horizontal swipe rail for mobile screens */
            .sidebar-tabs { width: 100%; height: 75px; flex-direction: row; overflow-x: scroll; overflow-y: hidden; padding: 0.75rem; }
            .side-tab { width: auto; padding: 8px 16px; }
            .display-workspace { padding: 1.5rem; height: auto; }
            .explain-box { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav class="top-navbar">
        <a href="index.html" class="nav-tab">Home</a>
        <a href="directory.html" class="nav-tab active">Directory</a>
    </nav>

    <div class="workspace-split">
        <!-- Generates 100 Custom Sidebar Tabs on the Fly -->
        <div class="sidebar-tabs" id="tabContainer"></div>

        <!-- Explaining Display Workspace -->
        <div class="display-workspace">
            <div class="subject-header-area">
                <h2 id="currentSubjectTitle">Loading Node...</h2>
            </div>
            
            <div class="explain-box">
                <p id="currentSubjectExplanation" style="margin-bottom:0; color:#cbd5e1; font-size:1.05rem;"></p>
            </div>

            <!-- Custom Room Chat Module -->
            <div class="embedded-chat-module">
                <div class="chat-header-line" id="chatRoomTitle">#channel-lobby</div>
                <div class="chat-feed-box" id="chatFeed"></div>
                <div class="chat-input-wrapper">
                    <input type="text" class="chat-field" id="chatInputField" placeholder="Send an anonymous message to this channel...">
                    <button class="chat-send-btn" id="chatSendBtn">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const baseSubjects = ["Math", "Philosophy", "Neuroscience", "Quantum Physics", "Astronomy", "Computer Science", "Chemistry", "Psychology", "History", "Literature"];
        const subjectList = [];
        
        // Flawlessly builds exactly 100 research subject modules
        for(let i = 1; i <= 100; i++) {
            const base = baseSubjects[(i - 1) % baseSubjects.length];
            subjectList.push({
                id: i,
                title: `${base} Level 0${i}`,
                explain: `This dedicated workspace serves as the database node for ${base} parameters. Here, you can compile algorithmic resources, map research models, analyze contextual frameworks, and communicate directly inside the custom isolated channel system.`,
                chatHistory: [
                    { user: "System_Bot", msg: `Isolated stream initialized for ${base} systems node.` },
                    { user: "Dev_Freya", msg: `Welcome to the custom subject database.` }
                ]
            });
        }

        const tabContainer = document.getElementById('tabContainer');
        let currentActiveId = 1;

        function renderWorkspace(id) {
            const currentSub = subjectList.find(s => s.id === id);
            document.getElementById('currentSubjectTitle').textContent = currentSub.title;
